<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sokoban</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1008;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: monospace;
      color: #f0e6d0;
      gap: 14px;
    }
    h1 {
      font-size: 2.2rem;
      color: #c17f24;
      letter-spacing: 0.25em;
    }
    #levelTitle {
      font-size: 1.05rem;
      color: #a0906a;
    }
    #moves {
      font-size: 1rem;
      color: #f0e6d0;
    }
    canvas {
      display: block;
      border: 2px solid #4a3728;
    }
    #message {
      font-size: 1.15rem;
      color: #3cb371;
      min-height: 1.5em;
    }
    #controls {
      font-size: 0.78rem;
      color: #706050;
      text-align: center;
      line-height: 2;
    }
    #controls span {
      color: #a0906a;
    }
  </style>
</head>
<body>
  <h1>SOKOBAN</h1>
  <div id="levelTitle"></div>
  <div id="moves">Moves: 0</div>
  <canvas id="gameCanvas"></canvas>
  <div id="message"></div>
  <div id="controls">
    <span>↑↓←→</span> / <span>WASD</span> : déplacer &nbsp;|&nbsp;
    <span>R</span> : recommencer &nbsp;|&nbsp;
    <span>U</span> : annuler &nbsp;|&nbsp;
    <span>N</span> : niveau suivant
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
