<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Klondike Solitaire</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d2b12;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: monospace;
      color: #e8d8a0;
      gap: 12px;
      padding: 16px 8px 32px;
    }
    h1 {
      font-size: 2rem;
      color: #d4aa40;
      letter-spacing: 0.2em;
      margin-top: 4px;
    }
    #controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      font-size: 0.82rem;
      color: #a0b890;
    }
    select, button {
      background: #1a4020;
      color: #e8d8a0;
      border: 1px solid #3a6a40;
      border-radius: 4px;
      padding: 5px 10px;
      font-family: monospace;
      font-size: 0.82rem;
      cursor: pointer;
      outline: none;
    }
    select:focus, button:hover { border-color: #d4aa40; }
    select option { background: #1a4020; }
    #moves { color: #80a870; }
    canvas { cursor: pointer; display: block; max-width: 100%; }
    #message {
      font-size: 1.4rem;
      color: #d4aa40;
      min-height: 1.8em;
      text-align: center;
    }
    #hint {
      font-size: 0.72rem;
      color: #3a5a38;
      text-align: center;
      line-height: 1.8;
    }
    #hint span { color: #5a8050; }
  </style>
  <script type="module" crossorigin src="./assets/index-De7xIrju.js"></script>
</head>
<body>
  <h1>KLONDIKE</h1>

  <div id="controls">
    <label for="modeSelect">Mode :</label>
    <select id="modeSelect">
      <option value="normal">Normal (rouge / noir)</option>
      <option value="mono">Monochrome (tout en noir)</option>
    </select>
    <button id="newGameBtn">Nouvelle partie</button>
    <button id="autoBtn">Auto-compléter</button>
    <button id="undoBtn">Annuler</button>
    <span id="moves">Déplacements : 0</span>
  </div>

  <canvas id="gameCanvas"></canvas>
  <div id="message"></div>

  <div id="hint">
    <span>Clic</span> : sélectionner / déplacer &nbsp;|&nbsp;
    <span>Double-clic</span> : envoyer à la fondation &nbsp;|&nbsp;
    <span>Clic sur le talon</span> : retourner une carte
  </div>

</body>
</html>
