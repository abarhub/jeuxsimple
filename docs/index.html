<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mes Jeux</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0f0f1a;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(60, 40, 120, 0.35) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, rgba(20, 60, 80, 0.35) 0%, transparent 55%);
      color: #e0e0e0;
      font-family: 'Inter', system-ui, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 64px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    header p {
      color: #888;
      font-size: 0.95rem;
    }

    /* ── Sections ── */
    section {
      width: 100%;
      max-width: 900px;
      margin-bottom: 40px;
    }

    section h2 {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 16px;
      padding-left: 4px;
      border-left: 3px solid #444;
      padding-left: 10px;
    }

    /* ── Cards grid ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 28px 16px 22px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent-a, #6366f1), var(--accent-b, #06b6d4));
      opacity: 0;
      transition: opacity 0.22s ease;
      z-index: 0;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.18);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }

    .card:hover::before { opacity: 0.12; }

    .card .icon {
      font-size: 2.8rem;
      line-height: 1;
      z-index: 1;
    }

    .card .name {
      font-size: 1rem;
      font-weight: 600;
      z-index: 1;
      text-align: center;
    }

    .card .desc {
      font-size: 0.78rem;
      color: #999;
      text-align: center;
      z-index: 1;
      line-height: 1.4;
    }

    /* Accent colors per card */
    .card-curveball  { --accent-a: #f59e0b; --accent-b: #ef4444; }
    .card-sokoban    { --accent-a: #10b981; --accent-b: #3b82f6; }
    .card-klondike   { --accent-a: #ec4899; --accent-b: #8b5cf6; }
    .card-chess      { --accent-a: #a78bfa; --accent-b: #60a5fa; }
    .card-wikipedia  { --accent-a: #64748b; --accent-b: #94a3b8; }
    .card-github     { --accent-a: #374151; --accent-b: #6b7280; }
    .card-mozilla    { --accent-a: #e05d44; --accent-b: #f97316; }

    /* ── Links section (smaller) ── */
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .link-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      text-decoration: none;
      color: #bbb;
      font-size: 0.9rem;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .link-pill:hover {
      background: rgba(255,255,255,0.10);
      color: #fff;
      border-color: rgba(255,255,255,0.2);
    }

    .link-pill .pill-icon { font-size: 1.1rem; }

    footer {
      margin-top: 24px;
      color: #444;
      font-size: 0.78rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>🎮 Mes Jeux</h1>
    <p>Cliquez sur un jeu pour l'ouvrir dans un nouvel onglet</p>
  </header>

  <section>
    <h2>Jeux</h2>
    <div class="cards">

      <a class="card card-curveball"
         href="https://abarhub.github.io/jeuxsimple/curveball/index.html"
         target="_blank" rel="noopener noreferrer">
        <span class="icon">🏓</span>
        <span class="name">CurveBall</span>
        <span class="desc">Tennis de table en 3D</span>
      </a>

      <a class="card card-sokoban"
         href="https://abarhub.github.io/jeuxsimple/sokoban/index.html"
         target="_blank" rel="noopener noreferrer">
        <span class="icon">📦</span>
        <span class="name">Sokoban</span>
        <span class="desc">Poussez les caisses sur les cibles</span>
      </a>

      <a class="card card-klondike"
         href="https://abarhub.github.io/jeuxsimple/klondike/index.html"
         target="_blank" rel="noopener noreferrer">
        <span class="icon">🃏</span>
        <span class="name">Klondike</span>
        <span class="desc">Solitaire classique</span>
      </a>

      <a class="card card-chess"
         href="https://abarhub.github.io/jeuxsimple/chess/index.html"
         target="_blank" rel="noopener noreferrer">
        <span class="icon">♟</span>
        <span class="name">Échecs</span>
        <span class="desc">Joueur vs Joueur ou contre l'IA</span>
      </a>

    </div>
  </section>

  <section>
    <h2>Liens</h2>
    <div class="links">

      <a class="link-pill"
         href="https://www.wikipedia.org"
         target="_blank" rel="noopener noreferrer">
        <span class="pill-icon">📖</span> Wikipédia
      </a>

      <a class="link-pill"
         href="https://www.github.com"
         target="_blank" rel="noopener noreferrer">
        <span class="pill-icon">🐙</span> GitHub
      </a>

      <a class="link-pill"
         href="https://www.mozilla.org"
         target="_blank" rel="noopener noreferrer">
        <span class="pill-icon">🦊</span> Mozilla
      </a>

    </div>
  </section>

  <footer>jeuxsimple · abarhub.github.io</footer>

</body>
</html>
