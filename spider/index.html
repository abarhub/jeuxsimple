<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spider Solitaire</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1f0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 12px 40px;
      user-select: none;
    }

    h1 {
      font-size: 1.7rem;
      letter-spacing: 3px;
      color: #b8d4a0;
      margin-bottom: 14px;
    }

    #controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 14px;
    }

    label {
      font-size: 0.9rem;
      color: #8aaa80;
    }

    select, button {
      font-size: 0.9rem;
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid #3a6040;
      background: #1c3a20;
      color: #d0e8c8;
      cursor: pointer;
      transition: background 0.15s;
    }

    select:focus, button:hover { background: #2a5030; outline: none; }

    button:disabled {
      opacity: 0.4;
      cursor: default;
    }

    #hint {
      font-size: 0.78rem;
      color: #607860;
      margin-bottom: 6px;
    }

    #canvas-wrap {
      width: 100%;
      max-width: 816px;
    }

    canvas {
      display: block;
      cursor: pointer;
      /* largeur et hauteur CSS gérées dynamiquement par main.ts */
    }

    #message {
      margin-top: 14px;
      font-size: 1.3rem;
      font-weight: 700;
      color: #f0d060;
      min-height: 32px;
      text-align: center;
    }
  </style>
</head>
<body>

  <h1>🕷 Spider</h1>

  <div id="controls">
    <label for="modeSelect">Mode :</label>
    <select id="modeSelect">
      <option value="black">1 couleur (♠ piques uniquement)</option>
      <option value="color">Toutes les couleurs (♠ ♣ ♥ ♦)</option>
    </select>
    <button id="newGameBtn">Nouvelle partie</button>
    <button id="undoBtn" disabled>Annuler (Ctrl+Z)</button>
  </div>

  <p id="hint">Cliquez pour sélectionner · Cliquez encore pour déposer · Double-clic pour sélectionner toute la suite · Échap pour désélectionner</p>

  <div id="canvas-wrap">
    <canvas id="gameCanvas"></canvas>
  </div>

  <div id="message"></div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
